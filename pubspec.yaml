name: novon
description: "Novon | A free, open-source, cross-platform novel reader built with Flutter."
publish_to: 'none'
version: 0.0.4+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  dio: ^5.4.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.0.0
  html: ^0.15.4
  xml: ^6.5.0
  flutter_widget_from_html: ^0.15.2
  scrollable_positioned_list: ^0.3.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  wakelock_plus: ^1.2.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  crypto: ^3.0.3
  pub_semver: ^2.1.4
  permission_handler: ^12.0.1
  fl_chart: ^1.2.0
  connectivity_plus: ^7.1.1
  local_auth: ^3.0.1
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  device_info_plus: ^12.4.0
  flutter_colorpicker: ^1.1.0
  timeago: ^3.7.1
  dio_cache_interceptor: ^4.0.6
  archive: ^4.0.9
  volume_controller: ^3.4.4
  saf: ^1.0.4
  path: ^1.9.1
  file_picker: ^8.0.0
  shared_preferences: ^2.2.3
  workmanager: ^0.9.0+3
  background_downloader: ^9.5.4
  intl: ^0.20.2
  flutter_js: ^0.8.7
  flutter_inappwebview: ^6.1.5
  share_plus: ^12.0.2
  flutter_cache_manager: ^3.4.1
  open_filex: ^4.7.0
  flutter_svg: ^2.0.10+1
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/js/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Alexandria
      fonts:
        - asset: assets/fonts/Alexandria-Regular.ttf
    - family: El Messiri
      fonts:
        - asset: assets/fonts/ElMessiri-Regular.ttf
    - family: Lalezar
      fonts:
        - asset: assets/fonts/Lalezar-Regular.ttf
